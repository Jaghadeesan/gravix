# Application name
spring.application.name=collabflow

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/collabflow
spring.datasource.username=collabflow_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Cloud connection
spring.data.redis.host=believable-walk-trucks-57765.db.redis.io
spring.data.redis.port=19765
spring.data.redis.username=default
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000